name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: true

# App lives in ./frontend, so npm ci/build run there. (careatlas's app was at the repo
# root, so it needed no working-directory — that is the only difference.)
defaults:
  run:
    working-directory: ./frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # Deployed site can't reach the local backend, so build in demo/mock mode.
        # VITE_FRONTDOOR_LIVE=false keeps the front-door chat on mock too, since the
        # hosted site has no /api rewrite to the Render backend yet (relative /api
        # calls would 404 on Firebase). Flip both once prod points at the Render URL.
        env:
          VITE_USE_MOCK: "true"
          VITE_FRONTDOOR_LIVE: "false"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          entryPoint: ./frontend
          # Pin CLI to 13.x (careatlas note): latest 15.x throws a misleading auth error on runners.
          firebaseToolsVersion: "13"
